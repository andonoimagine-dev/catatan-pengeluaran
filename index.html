<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Pengeluaran</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Catatan Pengeluaran</h1>
            <p class="subtitle">Catat pengeluaran harian dengan mudah</p>
        </header>

        <section class="month-nav">
            <button id="prevMonthBtn" class="btn-nav" aria-label="Bulan sebelumnya">&#8249;</button>
            <div class="month-nav-center">
                <span id="monthLabel" class="month-label"></span>
                <button id="currentMonthBtn" class="btn-text hidden">Kembali ke Bulan Ini</button>
            </div>
            <button id="nextMonthBtn" class="btn-nav" aria-label="Bulan berikutnya">&#8250;</button>
        </section>

        <section class="summary">
            <div class="summary-card">
                <div class="summary-label">Total Hari Ini</div>
                <div class="summary-amount" id="todayTotal">Rp 0</div>
            </div>
            <div class="summary-card accent">
                <div class="summary-label" id="monthTotalLabel">Total Bulan Ini</div>
                <div class="summary-amount" id="monthTotal">Rp 0</div>
            </div>
            <div class="summary-card hidden" id="budgetCard">
                <div class="summary-label">Sisa Anggaran</div>
                <div class="summary-amount" id="budgetRemaining">Rp 0</div>
                <div class="summary-note" id="budgetNote"></div>
            </div>
        </section>

        <section class="input-section">
            <form id="expenseForm" class="expense-form">
                <div class="form-group">
                    <label for="inputDate">Tanggal</label>
                    <input type="date" id="inputDate" required>
                </div>
                <div class="form-group">
                    <label for="inputCategory">Kategori</label>
                    <select id="inputCategory" required>
                        <option value="">Pilih Kategori</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="inputAmount">Jumlah (Rp)</label>
                    <input type="number" id="inputAmount" min="1" required>
                </div>
                <div class="form-group">
                    <label for="inputNote">Catatan (Opsional)</label>
                    <input type="text" id="inputNote" placeholder="Deskripsi pengeluaran...">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="submitBtn">Tambah Pengeluaran</button>
                    <button type="button" class="btn-secondary hidden" id="cancelEditBtn">Batal</button>
                </div>
            </form>
        </section>

        <section class="stats-section">
            <h2 id="statsTitle">Rincian per Kategori</h2>
            <div id="categoryStats" class="category-stats">
                <p class="empty-message">Belum ada pengeluaran bulan ini</p>
            </div>
        </section>

        <section class="stats-section">
            <h2>Tren 6 Bulan Terakhir</h2>
            <div id="trendChart" class="category-stats"></div>
        </section>

        <section class="stats-section">
            <h2>Kelola Anggaran Bulanan</h2>
            <div class="budget-panel">
                <form id="budgetForm" class="budget-form">
                    <div class="form-group">
                        <label for="budgetTarget">Anggaran Untuk</label>
                        <select id="budgetTarget" required>
                            <option value="__total__">Total Bulanan</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="budgetAmount">Batas (Rp)</label>
                        <input type="number" id="budgetAmount" min="1" required>
                    </div>
                    <button type="submit" class="btn-primary">Simpan Anggaran</button>
                </form>
                <div id="budgetList" class="budget-list"></div>
            </div>
        </section>

        <section class="filter-section">
            <label for="filterCategory">Filter Kategori:</label>
            <select id="filterCategory">
                <option value="">Semua Kategori</option>
            </select>
        </section>

        <section class="list-section">
            <h2>Daftar Pengeluaran</h2>
            <div id="expenseList" class="expense-list">
                <p class="empty-message">Belum ada catatan pengeluaran</p>
            </div>
        </section>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
